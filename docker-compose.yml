services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: oxbow_database
      MYSQL_USER: oxbow_user
      MYSQL_PASSWORD: oxbow_password
    command: --max_connections=200 --wait_timeout=60 --interactive_timeout=60
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount the dump file to automatically initialize the database
      - ./database/dump.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
